<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label">Approved gradient pairs — CTAs, active tabs, chart accents ONLY</div>
<div class="row">
  <div class="sw"><div class="sw-chip" style="background:linear-gradient(135deg,#0891b2,#14b8a6);height:72px"></div><div class="sw-name">Analyze</div><div class="sw-hex">#0891b2 → #14b8a6</div></div>
  <div class="sw"><div class="sw-chip" style="background:linear-gradient(135deg,#7c3aed,#a855f7);height:72px"></div><div class="sw-name">Violet</div><div class="sw-hex">#7c3aed → #a855f7</div></div>
  <div class="sw"><div class="sw-chip" style="background:linear-gradient(135deg,#4f46e5,#9333ea);height:72px"></div><div class="sw-name">Indigo</div><div class="sw-hex">#4f46e5 → #9333ea</div></div>
  <div class="sw"><div class="sw-chip" style="background:linear-gradient(135deg,#F8B400,#FFCA3A);height:72px"></div><div class="sw-name">Gold</div><div class="sw-hex">#F8B400 → #FFCA3A</div></div>
  <div class="sw"><div class="sw-chip" style="background:linear-gradient(135deg,#00C2B8,#33D1C9);height:72px"></div><div class="sw-name">Teal</div><div class="sw-hex">#00C2B8 → #33D1C9</div></div>
</div>
<div style="margin-top:12px;font-family:'DM Mono';font-size:10px;color:#64748B">Never use these hex as flat fills, text, or backgrounds.</div>
</body></html>
