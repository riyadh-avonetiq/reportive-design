<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">
<div class="label">Liquid glass surfaces — never glass-on-glass</div>
<div style="display:flex;gap:10px">
  <div style="flex:1;padding:14px 14px 16px;border-radius:12px;background:linear-gradient(135deg,rgba(12,24,44,.7),rgba(0,194,184,.08));border:1px solid rgba(0,194,184,.2);box-shadow:inset 0 1px 0 rgba(0,194,184,.2),0 4px 24px -4px rgba(0,0,0,.3);backdrop-filter:blur(4px)">
    <div style="font-family:'DM Mono';font-size:9.5px;color:#64748B;text-transform:uppercase;letter-spacing:0.08em">Primary</div>
    <div style="font-family:'Space Grotesk';font-size:26px;font-weight:700;color:#00C2B8;margin-top:4px">84.7</div>
    <div style="font-family:'Manrope';font-size:11px;color:#94A3B8;margin-top:2px">Authority Score</div>
  </div>
  <div style="flex:1;padding:14px 14px 16px;border-radius:12px;background:radial-gradient(circle at top right,rgba(248,180,0,.12),transparent 70%),rgba(12,24,44,.7);border:1px solid rgba(248,180,0,.3);box-shadow:inset 0 1px 0 rgba(248,180,0,.3),inset 0 0 40px rgba(248,180,0,.05),0 8px 32px -4px rgba(0,0,0,.4);backdrop-filter:blur(4px)">
    <div style="font-family:'DM Mono';font-size:9.5px;color:#64748B;text-transform:uppercase;letter-spacing:0.08em">Gold</div>
    <div style="font-family:'Space Grotesk';font-size:26px;font-weight:700;color:#F8B400;margin-top:4px">A+</div>
    <div style="font-family:'Manrope';font-size:11px;color:#94A3B8;margin-top:2px">Gold tier</div>
  </div>
  <div style="flex:1;padding:14px 14px 16px;border-radius:12px;background:linear-gradient(145deg,rgba(12,24,44,.8),rgba(12,24,44,.5));border:1px solid rgba(255,255,255,.08);box-shadow:0 15px 30px -12px rgba(0,0,0,.6);backdrop-filter:blur(4px)">
    <div style="font-family:'DM Mono';font-size:9.5px;color:#64748B;text-transform:uppercase;letter-spacing:0.08em">Navy</div>
    <div style="font-family:'Space Grotesk';font-size:26px;font-weight:700;color:#FCFCFC;margin-top:4px">Menu</div>
    <div style="font-family:'Manrope';font-size:11px;color:#94A3B8;margin-top:2px">Nav surface</div>
  </div>
</div>
</body></html>
