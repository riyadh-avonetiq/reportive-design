<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:20px 24px">
<div class="label">Shadow & elevation system</div>
<div style="display:flex;gap:16px;align-items:center;margin-top:6px">
  <div style="flex:1"><div style="height:56px;background:#1C2A3F;border:1px solid #334766;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.1)"></div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8;margin-top:6px">sm · resting</div></div>
  <div style="flex:1"><div style="height:56px;background:#1C2A3F;border:1px solid #334766;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.3)"></div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8;margin-top:6px">md · cards</div></div>
  <div style="flex:1"><div style="height:56px;background:#1C2A3F;border:1px solid #334766;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)"></div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8;margin-top:6px">lg · hover</div></div>
  <div style="flex:1"><div style="height:56px;background:#1C2A3F;border:1px solid rgba(0,194,184,.4);border-radius:10px;box-shadow:0 10px 40px -10px rgba(0,194,184,.3),inset 0 0 20px rgba(0,194,184,.05)"></div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8;margin-top:6px">teal glow</div></div>
  <div style="flex:1"><div style="height:56px;background:#1C2A3F;border:1px solid rgba(248,180,0,.4);border-radius:10px;box-shadow:0 0 15px rgba(89,54,0,.6)"></div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8;margin-top:6px">gold glow</div></div>
</div>
</body></html>
