<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">
<div class="label">Buttons</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <button style="padding:10px 18px;background:linear-gradient(135deg,#00C2B8,#009E96);color:#0C182C;font-family:'Space Grotesk';font-size:13px;font-weight:700;border:none;border-radius:8px;box-shadow:0 4px 20px rgba(0,194,184,.3);cursor:pointer">Primary CTA</button>
  <button style="padding:10px 18px;background:#243350;color:#FCFCFC;font-family:'Space Grotesk';font-size:13px;font-weight:600;border:1px solid #334766;border-radius:8px;cursor:pointer">Secondary</button>
  <button style="padding:10px 18px;background:transparent;color:#94A3B8;font-family:'Space Grotesk';font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer">Ghost</button>
  <button style="padding:6px 12px;background:rgba(0,194,184,.08);color:#00C2B8;font-family:'Space Grotesk';font-size:12px;font-weight:600;border:1px solid rgba(0,194,184,.25);border-radius:6px;cursor:pointer">Small · Tag</button>
</div>
<div style="margin-top:14px;display:flex;gap:10px">
  <button style="padding:10px 18px;background:linear-gradient(135deg,#F8B400,#FFCA3A);color:#0C182C;font-family:'Space Grotesk';font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer">Featured · Gold</button>
  <button style="padding:10px 18px;background:#1C2A3F;color:#475569;font-family:'Space Grotesk';font-size:13px;font-weight:600;border:1px solid #243350;border-radius:8px;cursor:not-allowed">Disabled</button>
</div>
</body></html>
