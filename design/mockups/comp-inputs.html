<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">
<div class="label">Inputs & Form Controls</div>
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
  <input placeholder="Search campaigns…" style="padding:10px 14px;background:#243350;border:1.5px solid #334766;border-radius:8px;color:#FCFCFC;font-family:'Manrope';font-size:13px;outline:none;width:200px">
  <input value="you@avonetiq.id" style="padding:10px 14px;background:#243350;border:1.5px solid #00C2B8;border-radius:8px;color:#FCFCFC;font-family:'Manrope';font-size:13px;outline:none;width:200px;box-shadow:0 0 0 3px rgba(0,194,184,.1)">
  <select style="padding:10px 14px;background:#243350;border:1.5px solid #334766;border-radius:8px;color:#FCFCFC;font-family:'Manrope';font-size:13px;outline:none"><option>All accounts</option></select>
</div>
<div style="display:flex;gap:16px;margin-top:14px;align-items:center">
  <label style="display:flex;align-items:center;gap:8px;font-family:'Manrope';font-size:13px;color:#FCFCFC">
    <span style="width:18px;height:18px;background:#00C2B8;border-radius:4px;display:flex;align-items:center;justify-content:center">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0C182C" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
    </span>Daily
  </label>
  <label style="display:flex;align-items:center;gap:8px;font-family:'Manrope';font-size:13px;color:#94A3B8">
    <span style="width:18px;height:18px;background:#243350;border:1.5px solid #334766;border-radius:4px"></span>Weekly
  </label>
  <div style="width:36px;height:20px;background:#00C2B8;border-radius:10px;position:relative"><div style="position:absolute;top:2px;right:2px;width:16px;height:16px;background:#FCFCFC;border-radius:50%"></div></div>
  <div style="width:36px;height:20px;background:#243350;border:1px solid #334766;border-radius:10px;position:relative"><div style="position:absolute;top:1px;left:1px;width:16px;height:16px;background:#64748B;border-radius:50%"></div></div>
</div>
</body></html>
