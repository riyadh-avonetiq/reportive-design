<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label">Pillars & Status — semantic accents</div>
<div class="row">
  <div class="sw"><div class="sw-chip" style="background:#00C2B8"></div><div class="sw-name">Optimize</div><div class="sw-hex">#00C2B8</div></div>
  <div class="sw"><div class="sw-chip" style="background:#7000FF"></div><div class="sw-name">Manifest</div><div class="sw-hex">#7000FF</div></div>
  <div class="sw"><div class="sw-chip" style="background:#F8B400"></div><div class="sw-name">Generative</div><div class="sw-hex">#F8B400</div></div>
  <div class="sw"><div class="sw-chip" style="background:#0EA5E9"></div><div class="sw-name">Sky</div><div class="sw-hex">#0EA5E9</div></div>
  <div class="sw"><div class="sw-chip" style="background:#02605C"></div><div class="sw-name">Success</div><div class="sw-hex">#02605C</div></div>
  <div class="sw"><div class="sw-chip" style="background:#D5650F"></div><div class="sw-name">Warning</div><div class="sw-hex">#D5650F</div></div>
  <div class="sw"><div class="sw-chip" style="background:#E3170A"></div><div class="sw-name">Error</div><div class="sw-hex">#E3170A</div></div>
</div>
<div style="margin-top:14px;padding:10px 12px;background:#111D32;border:1px solid #334766;border-radius:8px;font-family:'Manrope';font-size:11px;color:#94A3B8;line-height:1.5">
  <span style="color:#00C2B8;font-weight:600">Rule:</span> Score colors ONLY — teal (70+), gold (50–69), error (0–49). Never use Tailwind emerald/amber for scores.
</div>
</body></html>
