<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">
<div class="label">Badges, Chips & Status Pills</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
  <span style="padding:3px 10px;background:rgba(22,163,74,.12);color:#16A34A;border:1px solid rgba(22,163,74,.3);border-radius:9999px;font-family:'Space Grotesk';font-size:11px;font-weight:600">Active</span>
  <span style="padding:3px 10px;background:rgba(248,180,0,.1);color:#F8B400;border:1px solid rgba(248,180,0,.3);border-radius:9999px;font-family:'Space Grotesk';font-size:11px;font-weight:600">Paused</span>
  <span style="padding:3px 10px;background:rgba(227,23,10,.1);color:#E3170A;border:1px solid rgba(227,23,10,.3);border-radius:9999px;font-family:'Space Grotesk';font-size:11px;font-weight:600">Error</span>
  <span style="padding:2px 8px;background:rgba(66,133,244,.12);color:#4285F4;border-radius:4px;font-family:'Space Grotesk';font-size:10px;font-weight:600">Google Ads</span>
  <span style="padding:2px 8px;background:rgba(24,119,242,.12);color:#1877F2;border-radius:4px;font-family:'Space Grotesk';font-size:10px;font-weight:600">Meta Ads</span>
  <span style="padding:2px 8px;background:rgba(0,194,184,.1);color:#00C2B8;border-radius:4px;font-family:'Space Grotesk';font-size:10px;font-weight:600">Search Console</span>
</div>
<div style="display:flex;gap:12px;margin-top:14px;align-items:center">
  <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid rgba(0,194,184,.3);background:rgba(0,194,184,.05);color:#00C2B8;font-family:'DM Mono';font-size:10px;text-transform:uppercase;letter-spacing:0.1em;border-radius:9999px">
    <span style="width:6px;height:6px;background:#00C2B8;border-radius:50%"></span>Connected
  </span>
  <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid rgba(248,180,0,.3);background:rgba(248,180,0,.05);color:#F8B400;font-family:'DM Mono';font-size:10px;text-transform:uppercase;letter-spacing:0.1em;border-radius:9999px">
    <span style="width:6px;height:6px;background:#F8B400;border-radius:50%"></span>Syncing
  </span>
  <span style="font-family:'DM Mono';font-size:11px;color:#16A34A">▲ 12.4%</span>
  <span style="font-family:'DM Mono';font-size:11px;color:#DC2626">▼ 3.1%</span>
</div>
</body></html>
