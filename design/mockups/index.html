<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reportive UI Kit</title>
<link rel="icon" href="../../assets/favicon.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#f0eee9;height:100%}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./design-canvas.jsx"></script>
<script type="text/babel" src="./chrome.jsx"></script>
<script type="text/babel" src="./screen-dashboard.jsx"></script>
<script type="text/babel" src="./screen-campaigns.jsx"></script>
<script type="text/babel" src="./screen-seo.jsx"></script>
<script type="text/babel" src="./screen-login.jsx"></script>
<script type="text/babel">
const W = 1280, H = 820;
const App = () => (
  <DesignCanvas>
    <DCSection id="auth" title="Auth & entry" subtitle="Login surface with full-bleed gradient flare">
      <DCArtboard id="login" label="Login · Gradient flare" width={1100} height={740}>
        <ScreenLogin/>
      </DCArtboard>
    </DCSection>
    <DCSection id="reporting" title="Reporting app" subtitle="Three connected dashboard surfaces — sidebar, top bar, bilingual analyst copy">
      <DCArtboard id="dashboard" label="01 · Dashboard overview" width={W} height={H}>
        <ScreenDashboard/>
      </DCArtboard>
      <DCArtboard id="campaigns" label="02 · Campaigns (Google Ads)" width={W} height={H}>
        <ScreenCampaigns/>
      </DCArtboard>
      <DCArtboard id="seo" label="03 · SEO &amp; Organic" width={W} height={H}>
        <ScreenSEO/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
