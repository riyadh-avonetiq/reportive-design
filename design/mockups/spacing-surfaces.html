<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">

  <div style="flex:1;background:#111D32;display:flex;align-items:flex-end;padding:10px 10px 8px"><div><div style="font-family:'DM Mono';font-size:10px;color:#64748B">L1</div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8">navy-deep</div></div></div>
  <div style="flex:1;background:#1C2A3F;display:flex;align-items:flex-end;padding:10px 10px 8px"><div><div style="font-family:'DM Mono';font-size:10px;color:#64748B">L2 · CARD</div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8">navy-surface</div></div></div>
  <div style="flex:1;background:#243350;display:flex;align-items:flex-end;padding:10px 10px 8px"><div><div style="font-family:'DM Mono';font-size:10px;color:#64748B">L3 · HOVER</div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8">navy-elevated</div></div></div>
  <div style="flex:1;background:#334766;display:flex;align-items:flex-end;padding:10px 10px 8px"><div><div style="font-family:'DM Mono';font-size:10px;color:#64748B">L4 · BORDER</div><div style="font-family:'DM Mono';font-size:10px;color:#94A3B8">navy-edge</div></div></div>
</div>
<div style="font-family:'Manrope';font-size:11px;color:#94A3B8;margin-top:10px">Each child surface is one step lighter than its parent. Never skip levels.</div>
</body></html>
