<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">
<div class="label">Metric card (KPI)</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div style="background:#1C2A3F;border:1px solid #334766;border-top:2px solid #F8B400;border-radius:12px;padding:16px">
    <div style="font-family:'Space Grotesk';font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#64748B">Total Ad Spend</div>
    <div style="font-family:'Space Grotesk';font-size:26px;font-weight:800;letter-spacing:-0.02em;color:#FCFCFC;margin-top:6px;font-variant-numeric:tabular-nums">Rp 48,5 Jt</div>
    <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
      <span style="font-family:'DM Mono';font-size:11px;color:#16A34A">▲ 12.4%</span>
      <span style="font-family:'Manrope';font-size:11px;color:#64748B">vs Feb 2025</span>
    </div>
  </div>
  <div style="background:#1C2A3F;border:1px solid #334766;border-top:2px solid #00C2B8;border-radius:12px;padding:16px">
    <div style="font-family:'Space Grotesk';font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#64748B">Organic Traffic</div>
    <div style="font-family:'Space Grotesk';font-size:26px;font-weight:800;letter-spacing:-0.02em;color:#FCFCFC;margin-top:6px;font-variant-numeric:tabular-nums">24.830</div>
    <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
      <span style="font-family:'DM Mono';font-size:11px;color:#16A34A">▲ 8.1%</span>
      <span style="font-family:'Manrope';font-size:11px;color:#64748B">vs Feb 2025</span>
    </div>
  </div>
</div>
</body></html>
